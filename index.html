<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RESPECT | ريسبكت رول بلاي</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Almarai:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root { 
            --main-red: #ff0000; 
            --dark-bg: #050505; 
            --card-black: #0a0a0a;
            --border-red: #330000;
        }
        body { font-family: 'Almarai', sans-serif; background-color: var(--dark-bg); color: white; margin: 0; overflow-x: hidden; }
        
        .glass { background: rgba(10, 10, 10, 0.9); backdrop-filter: blur(12px); border: 1px solid rgba(255,0,0,0.05); }
        .sidebar { transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1); z-index: 1000; }

        .rule-card { 
            background: var(--card-black); 
            border: 1px solid var(--border-red); 
            border-radius: 12px; 
            overflow: hidden; 
            transition: 0.3s ease;
            margin-bottom: 12px;
        }
        .rule-card:hover { border-color: var(--main-red); }

        .rule-header { 
            padding: 18px 25px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            cursor: pointer;
            user-select: none;
        }
        
        .rule-title { font-weight: 800; font-size: 1.1rem; color: #fff; letter-spacing: 0.5px; }
        
        .toggle-btn {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 0, 0, 0.1);
            border-radius: 8px;
            color: var(--main-red);
            transition: 0.3s;
        }

        .rule-content { 
            max-height: 0; 
            overflow: hidden; 
            transition: max-height 0.4s ease-out, padding 0.3s ease;
            background: rgba(255, 0, 0, 0.02);
            padding: 0 25px;
            color: #a1a1aa;
            line-height: 1.8;
            font-size: 0.95rem;
        }

        .rule-card.active { border-color: var(--main-red); box-shadow: 0 0 20px rgba(255, 0, 0, 0.05); }
        .rule-card.active .rule-content { max-height: 1000px; padding-bottom: 20px; border-top: 1px solid var(--border-red); }
        .rule-card.active .toggle-btn { background: var(--main-red); color: white; transform: rotate(180deg); }

        .hidden { display: none !important; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--main-red); border-radius: 10px; }
    </style>
</head>
<body>

    <div id="blacklist-screen" class="fixed inset-0 hidden flex flex-col items-center justify-center p-6 text-center bg-black z-[9999]">
        <i class="fas fa-ban text-9xl text-red-600 mb-8 animate__animated animate__shakeX animate__infinite"></i>
        <h1 class="text-5xl font-black mb-4 text-red-600">ACCESS DENIED</h1>
        <p class="text-zinc-500 text-xl max-w-lg mb-10" id="ban-reason"></p>
        <a href="https://discord.gg/rc1" class="border-2 border-red-600 text-red-600 px-10 py-3 rounded-full font-bold hover:bg-red-600 hover:text-white transition">DISCORD SUPPORT</a>
    </div>

    <nav class="fixed top-0 w-full p-5 flex justify-between items-center z-[100] glass border-b border-red-600/10">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-red-600 rounded-lg flex items-center justify-center shadow-[0_0_15px_rgba(255,0,0,0.5)]">
                <i class="fas fa-shield-alt text-white"></i>
            </div>
            <span class="font-black italic text-2xl text-white tracking-tighter">RESPECT <span class="text-red-600">RP</span></span>
        </div>
        <button id="menu-btn" class="text-white bg-red-600/10 w-10 h-10 rounded-lg"><i class="fas fa-bars"></i></button>
    </nav>

    <div id="sidebar" class="fixed top-0 -right-[320px] w-[300px] h-full sidebar glass border-l border-red-600/20 p-8 flex flex-col">
        <button id="close-btn" class="self-end text-2xl mb-12 text-red-600"><i class="fas fa-times"></i></button>
        <div class="flex flex-col gap-3">
            <button onclick="showSection('home')" class="p-4 text-right font-bold rounded-xl flex items-center justify-between hover:bg-red-600/10 transition">الرئيسية <i class="fas fa-home"></i></button>
            <button onclick="showSection('news')" class="p-4 text-right font-bold rounded-xl flex items-center justify-between hover:bg-red-600/10 transition">الأخبار <i class="fas fa-bullhorn"></i></button>
            <button onclick="showSection('rules')" class="p-4 text-right font-bold rounded-xl flex items-center justify-between hover:bg-red-600/10 transition">القوانين <i class="fas fa-gavel"></i></button>
            <button onclick="showSection('apps')" class="p-4 text-right font-bold rounded-xl flex items-center justify-between hover:bg-red-600/10 transition">التقديمات <i class="fas fa-id-card"></i></button>
            <hr class="border-white/5 my-4">
            <a href="./admin.html" id="admin-btn" class="hidden p-4 text-right font-bold text-red-600 border border-red-600/20 rounded-xl flex items-center justify-between italic">لوحة التحكم <i class="fas fa-user-shield"></i></a>
            <button onclick="logout()" class="p-4 text-right text-sm text-zinc-600 hover:text-red-600 mt-auto">تسجيل الخروج</button>
        </div>
    </div>

    <main class="pt-32 pb-10 px-6 max-w-4xl mx-auto">
        <section id="sec-home" class="animate__animated animate__fadeIn text-center">
            <div class="relative inline-block mb-10">
                <img src="logo.png" class="w-44 h-44 mx-auto relative z-10 drop-shadow-[0_0_50px_rgba(255,0,0,0.3)]">
                <div class="absolute inset-0 bg-red-600 blur-[100px] opacity-20"></div>
            </div>
            <h1 class="text-6xl font-black mb-4 italic tracking-tighter text-white">RESPECT <span class="text-red-600">RP</span></h1>
            <p class="text-zinc-500 text-lg max-w-xl mx-auto mb-10">الاحترام هو الأساس، ريسبكت رول بلاي يقدم لك بيئة لعب واقعية وفريدة.</p>
            <div id="login-block">
                <button onclick="startLogin()" class="bg-red-600 text-white px-12 py-4 rounded-full font-black text-xl hover:scale-105 transition shadow-[0_10px_30px_rgba(255,0,0,0.3)]">
                    <i class="fab fa-discord ml-2"></i> دخول عبر ديسكورد
                </button>
            </div>
            <div id="welcome-block" class="hidden glass p-4 rounded-full border-red-600/20 inline-flex items-center gap-4 pr-6">
                <div class="text-right">
                    <p class="text-zinc-500 text-[10px] font-bold uppercase">مرحباً بك مجدداً</p>
                    <p class="text-lg font-black" id="u-name"></p>
                </div>
                <img id="u-img" class="w-12 h-12 rounded-full border-2 border-red-600">
            </div>
        </section>

        <section id="sec-rules" class="hidden animate__animated animate__fadeIn">
            <h2 class="text-4xl font-black italic mb-10 border-r-8 border-red-600 pr-5">قوانين السيرفر</h2>
            <div id="rules-container"></div>
        </section>

        <section id="sec-news" class="hidden animate__animated animate__fadeIn">
            <h2 class="text-4xl font-black italic mb-10 border-r-8 border-red-600 pr-5">آخر الأخبار</h2>
            <div id="news-container" class="grid gap-4"></div>
        </section>

        <section id="sec-apps" class="hidden animate__animated animate__fadeIn">
            <h2 class="text-4xl font-black italic mb-10 border-r-8 border-red-600 pr-5 text-red-600">مركز التوظيف</h2>
            <div id="apps-container" class="grid md:grid-cols-2 gap-6"></div>
        </section>
    </main>

    <div id="modal-app" class="fixed inset-0 hidden glass z-[500] flex items-center justify-center p-4">
        <div class="bg-black w-full max-w-2xl rounded-3xl p-8 border border-red-600/30 shadow-2xl overflow-y-auto max-h-[90vh]">
            <div class="flex justify-between items-center mb-10">
                <h3 id="modal-title" class="text-3xl font-black italic text-red-600"></h3>
                <button onclick="closeAppModal()" class="text-zinc-500 hover:text-white"><i class="fas fa-times text-2xl"></i></button>
            </div>
            <div id="modal-questions" class="space-y-6"></div>
            <button onclick="submitForm()" id="submit-btn" class="w-full bg-red-600 text-white py-5 rounded-2xl font-black mt-10 hover:bg-red-700 transition shadow-xl shadow-red-600/20">إرسال الطلب الآن</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const _supabase = supabase.createClient('https://uvmsixbooxclnqduqivt.supabase.co', 'sb_publishable_c5KwR5PUs-dxGa57dLY5sw_c4TQ2Wo0');
        const CLIENT_ID = "1491862679256830223"; 
        const REDIRECT_URI = window.location.origin + window.location.pathname;

        let currentUser = null;
        let currentAppData = null;

        document.getElementById('menu-btn').onclick = () => document.getElementById('sidebar').style.right = '0';
        document.getElementById('close-btn').onclick = () => document.getElementById('sidebar').style.right = '-320px';

        function startLogin() { window.location.href = `https://discord.com/api/oauth2/authorize?client_id=${CLIENT_ID}&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&response_type=token&scope=identify`; }

        window.onload = async () => {
            const fragment = new URLSearchParams(window.location.hash.slice(1));
            let token = fragment.get('access_token');
            
            if (token) {
                localStorage.setItem('dc_token', token);
                window.history.replaceState({}, document.title, window.location.pathname);
            } else {
                token = localStorage.getItem('dc_token');
            }

            if (token) {
                try {
                    const res = await fetch('https://discord.com/api/users/@me', { headers: { authorization: `Bearer ${token}` } });
                    const user = await res.json();
                    
                    if (user.id) {
                        localStorage.setItem('respect_user', JSON.stringify(user));
                        const { data: ban } = await _supabase.from('blacklist').select('*').eq('user_id', user.id).single();
                        if (ban) {
                            document.getElementById('blacklist-screen').classList.remove('hidden');
                            document.getElementById('ban-reason').innerText = `بسبب: ${ban.reason}`;
                            return;
                        }
                        currentUser = user;
                        document.getElementById('login-block').classList.add('hidden');
                        document.getElementById('welcome-block').classList.remove('hidden');
                        document.getElementById('u-name').innerText = user.username;
                        document.getElementById('u-img').src = `https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.png`;
                        
                        const { data: staff } = await _supabase.from('staff').select('*').eq('user_id', user.id).single();
                        if (user.id === "1413745713439047807" || staff) {
                            document.getElementById('admin-btn').classList.remove('hidden');
                        }
                    }
                } catch (e) {
                    localStorage.removeItem('dc_token');
                }
            }
        };

        function showSection(id) {
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
            document.getElementById(`sec-${id}`).classList.remove('hidden');
            document.getElementById('sidebar').style.right = '-320px';
            if(id === 'news') loadNews();
            if(id === 'rules') loadRules();
            if(id === 'apps') loadApps();
        }

        async function loadRules() {
            const { data } = await _supabase.from('rules').select('*');
            document.getElementById('rules-container').innerHTML = data?.map(r => `
                <div class="rule-card">
                    <div class="rule-header" onclick="this.parentElement.classList.toggle('active')">
                        <span class="rule-title">${r.title}</span>
                        <div class="toggle-btn"><i class="fas fa-plus"></i></div>
                    </div>
                    <div class="rule-content">${r.content}</div>
                </div>`).join('') || '';
        }

        async function loadNews() {
            const { data } = await _supabase.from('news').select('*').order('created_at', {ascending: false});
            document.getElementById('news-container').innerHTML = data?.map(n => `
                <div class="glass p-6 rounded-2xl border-r-4 border-red-600">
                    <h3 class="text-xl font-bold mb-2">${n.title}</h3>
                    <p class="text-zinc-500 text-sm leading-relaxed">${n.content}</p>
                </div>`).join('') || '';
        }

        async function loadApps() {
            const { data } = await _supabase.from('forms').select('*');
            document.getElementById('apps-container').innerHTML = data?.map(a => `
                <div class="glass p-8 rounded-3xl border border-red-600/10 hover:border-red-600/40 transition group">
                    <div class="flex justify-between items-start mb-6">
                        <h3 class="text-2xl font-black italic group-hover:text-red-600 transition">${a.title}</h3>
                        <span class="px-3 py-1 rounded-full text-[10px] font-bold ${a.is_open ? 'bg-green-500/10 text-green-500' : 'bg-red-500/10 text-red-500'}">
                            ${a.is_open ? 'OPEN' : 'CLOSED'}
                        </span>
                    </div>
                    <p class="text-zinc-600 text-sm mb-8 leading-relaxed">${a.desc || 'لا يوجد وصف متاح.'}</p>
                    <button onclick="openForm('${a.id}')" ${!a.is_open ? 'disabled' : ''} 
                        class="w-full py-4 rounded-xl font-black transition ${a.is_open ? 'bg-white text-black hover:bg-red-600 hover:text-white' : 'bg-zinc-900 text-zinc-700 cursor-not-allowed'}">
                        ${a.is_open ? 'تقديم الآن' : 'التوظيف مغلق'}
                    </button>
                </div>`).join('') || '';
        }

        async function openForm(id) {
            if(!currentUser) return alert("سجل دخولك أولاً!");
            const { data: app } = await _supabase.from('forms').select('*').eq('id', id).single();
            currentAppData = app;
            document.getElementById('modal-title').innerText = app.title;
            document.getElementById('modal-questions').innerHTML = app.questions.map((q, i) => `
                <div class="space-y-3">
                    <label class="text-sm font-bold text-zinc-400 block">${q.text}</label>
                    ${q.type === 'text' ? `<input type="text" data-idx="${i}" class="q-in w-full bg-zinc-900/50 border border-white/5 p-4 rounded-xl focus:border-red-600 outline-none transition">` : 
                    `<select data-idx="${i}" class="q-in w-full bg-zinc-900/50 border border-white/5 p-4 rounded-xl focus:border-red-600 outline-none transition"><option>نعم</option><option>لا</option></select>`}
                </div>`).join('');
            document.getElementById('modal-app').classList.remove('hidden');
        }

        async function submitForm() {
            const btn = document.getElementById('submit-btn');
            btn.disabled = true; btn.innerText = "جاري الإرسال...";
            const results = Array.from(document.querySelectorAll('.q-in')).map(el => ({
                name: currentAppData.questions[el.dataset.idx].text,
                value: el.value || "بدون إجابة"
            }));
            try {
                if(currentAppData.webhook) {
                    await fetch(currentAppData.webhook, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({
                            embeds: [{
                                title: `طلب انضمام جديد: ${currentAppData.title}`,
                                color: 16711680,
                                thumbnail: { url: `https://cdn.discordapp.com/avatars/${currentUser.id}/${currentUser.avatar}.png` },
                                fields: [{ name: "المتقدم", value: `<@${currentUser.id}> (${currentUser.username})` }, ...results],
                                timestamp: new Date()
                            }]
                        })
                    });
                }
                alert("تم إرسال طلبك بنجاح!");
                closeAppModal();
            } catch (e) { alert("فشل الإرسال"); }
            finally { btn.disabled = false; btn.innerText = "إرسال الطلب الآن"; }
        }

        function closeAppModal() { document.getElementById('modal-app').classList.add('hidden'); }
        function logout() { localStorage.clear(); location.reload(); }
    </script>
</body>
</html>
