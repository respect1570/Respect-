<!DOCTYPE html>

    <!--
    ✅ CSP محكمة: تمنع تحميل أي سكريبت أو ستايل من مصادر غير معروفة
    ✅ لا unsafe-eval: يمنع تنفيذ eval() و new Function()
    -->
    <meta http-equiv="Content-Security-Policy" content="
        default-src 'none';
        script-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com https://cdn.jsdelivr.net;
        style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com;
        font-src https://fonts.gstatic.com https://cdnjs.cloudflare.com;

    ">
    <!-- ✅ منع Clickjacking -->
    <meta http-equiv="X-Frame-Options" content="DENY">

        .rule-content { max-height: 0; overflow: hidden; transition: max-height 0.4s ease-out, padding 0.3s ease; background: rgba(255,0,0,0.02); padding: 0 25px; color: #a1a1aa; line-height: 1.8; font-size: 0.95rem; white-space: pre-wrap; }
        .rule-card.active { border-color: var(--main-red); box-shadow: 0 0 20px rgba(255,0,0,0.05); }

        #toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px); background: #111; border: 1px solid #ff0000; color: white; padding: 12px 28px; border-radius: 50px; font-weight: bold; font-size: 0.9rem; transition: transform 0.4s ease; z-index: 9999; }
        #toast.show { transform: translateX(-50%) translateY(0); }
    </style>
</head>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// ============================================================
// ✅ الإعدادات الأساسية
// الـ ANON KEY آمن يكون مرئياً بشرط تفعيل RLS على Supabase
// ============================================================
const SUPABASE_URL  = 'https://uvmsixbooxclnqduqivt.supabase.co';
const SUPABASE_ANON = 'sb_publishable_c5KwR5PUs-dxGa57dLY5sw_c4TQ2Wo0';
const CLIENT_ID     = '1491862679256830223';
const REDIRECT_URI  = window.location.origin + window.location.pathname;

// الأقسام المسموح بها فقط (Whitelist)
const ALLOWED_SECTIONS = new Set(['home', 'news', 'rules', 'apps']);

// UUID regex للتحقق من معرّفات Supabase
const UUID_REGEX = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i;

// Discord ID regex (أرقام فقط 17-19 خانة)
const DISCORD_ID_REGEX = /^\d{17,19}$/;

// Discord avatar hash regex
const AVATAR_REGEX = /^[a-f0-9]{32}$/i;

const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

let currentUser    = null; // بيانات المستخدم في الذاكرة فقط
let currentAppData = null;

// ============================================================
// ✅ دوال الأمان
// ============================================================

/** تنظيف النص من أي HTML خطير */
function escapeHTML(str) {
    if (typeof str !== 'string') return '';
    const div = document.createElement('div');
    div.appendChild(document.createTextNode(str));
    return div.innerHTML;
}

/** تحقق من أن النص لا يتجاوز الطول المسموح */
function sanitizeText(str, maxLen = 500) {
    if (typeof str !== 'string') return '';
    return str.trim().substring(0, maxLen);
}

// ============================================================
// ✅ إدارة التوكن — sessionStorage + تشفير بسيط
// sessionStorage: يُمسح عند إغلاق المتصفح، معزول عن tabs أخرى
// ============================================================
const TokenStore = {
    _key: '_rt_v2',
    save(token) {
        try {
            // تشفير بسيط: base64 + عكس النص
            const encoded = btoa(encodeURIComponent(token)).split('').reverse().join('');
            sessionStorage.setItem(this._key, encoded);
        } catch { /* sessionStorage محجوب */ }
    },
    get() {
        try {
            const raw = sessionStorage.getItem(this._key);
            if (!raw) return null;
            return decodeURIComponent(atob(raw.split('').reverse().join('')));
        } catch { return null; }
    },
    clear() {
        try { sessionStorage.removeItem(this._key); } catch { /* ignore */ }
    }
};

// ============================================================
// ✅ Rate Limiter — يمنع إرسال طلبات متكررة
// ============================================================
const RateLimiter = {
    attempts: {},
    check(action, limit = 3, windowMs = 60000) {
        const now  = Date.now();
        const key  = action;
        const data = this.attempts[key] || { count: 0, start: now };

        if (now - data.start > windowMs) {
            this.attempts[key] = { count: 1, start: now };
            return true;
        }
        if (data.count >= limit) return false;
        data.count++;
        this.attempts[key] = data;
        return true;
    }
};

// ============================================================
// ✅ Toast بدل alert() — أكثر أماناً (لا يعرض HTML)
// ============================================================
function showToast(msg, duration = 3000) {
    const toast    = document.getElementById('toast');
    toast.textContent = sanitizeText(msg, 200); // textContent آمن
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), duration);
}

// ============================================================
// ✅ بناء DOM بشكل آمن بدون innerHTML من بيانات المستخدم
// ============================================================
function createRuleCard(rule) {
    const card   = document.createElement('div');
    card.className = 'rule-card';

    const header = document.createElement('div');
    header.className = 'rule-header';
    header.setAttribute('role', 'button');
    header.setAttribute('tabindex', '0');
    header.onclick = () => card.classList.toggle('active');
    header.onkeydown = (e) => { if (e.key === 'Enter' || e.key === ' ') card.classList.toggle('active'); };

    const title = document.createElement('span');
    title.className = 'rule-title';
    title.textContent = sanitizeText(rule.title, 200);

    const btn = document.createElement('div');
    btn.className   = 'toggle-btn';
    btn.setAttribute('aria-hidden', 'true');
    const icon = document.createElement('i');
    icon.className  = 'fas fa-plus';
    btn.appendChild(icon);

    header.appendChild(title);
    header.appendChild(btn);

    const content = document.createElement('div');
    content.className = 'rule-content';
    content.textContent = sanitizeText(rule.content, 2000);

    card.appendChild(header);
    card.appendChild(content);
    return card;
}

function createNewsCard(n) {
    const card = document.createElement('div');
    card.className = 'glass p-6 rounded-2xl border-r-4 border-red-600';

    const h3 = document.createElement('h3');
    h3.className   = 'text-xl font-bold mb-2';
    h3.textContent = sanitizeText(n.title, 200);

    const p = document.createElement('p');
    p.className   = 'text-zinc-500 text-sm leading-relaxed';
    p.textContent = sanitizeText(n.content, 1000);

    card.appendChild(h3);
    card.appendChild(p);
    return card;
}

function createAppCard(app) {
    const card = document.createElement('div');
    card.className = 'glass p-8 rounded-3xl border border-red-600/10 hover:border-red-600/40 transition group';

    const row = document.createElement('div');
    row.className = 'flex justify-between items-start mb-6';

    const h3 = document.createElement('h3');
    h3.className   = 'text-2xl font-black italic group-hover:text-red-600 transition';
    h3.textContent = sanitizeText(app.title, 100);

    const badge = document.createElement('span');
    badge.className = `px-3 py-1 rounded-full text-[10px] font-bold ${app.is_open ? 'bg-green-500/10 text-green-500' : 'bg-red-500/10 text-red-500'}`;
    badge.textContent = app.is_open ? 'OPEN' : 'CLOSED'; // ثابت، آمن

    row.appendChild(h3);
    row.appendChild(badge);

    const desc = document.createElement('p');
    desc.className   = 'text-zinc-600 text-sm mb-8 leading-relaxed';
    desc.textContent = sanitizeText(app.desc || 'لا يوجد وصف متاح.', 300);

    const btn = document.createElement('button');
    btn.className = `w-full py-4 rounded-xl font-black transition ${app.is_open ? 'bg-white text-black hover:bg-red-600 hover:text-white' : 'bg-zinc-900 text-zinc-700 cursor-not-allowed'}`;
    btn.textContent = app.is_open ? 'تقديم الآن' : 'التوظيف مغلق';
    btn.disabled    = !app.is_open;
    if (app.is_open) {
        // ✅ نمرر الـ ID بشكل آمن بدون onclick string
        btn.addEventListener('click', () => openForm(app.id));
    }

    card.appendChild(row);
    card.appendChild(desc);
    card.appendChild(btn);
    return card;
}

// ============================================================
// ✅ تحقق من صلاحية الأدمن من قاعدة البيانات فقط
// ============================================================
async function checkIsAdmin(userId) {
    if (!DISCORD_ID_REGEX.test(userId)) return false;
    try {
        const { data, error } = await _supabase
            .from('staff')
            .select('role')
            .eq('user_id', userId)
            .maybeSingle(); // maybeSingle لا يرمي error لو مافيش سجل
        return !error && !!data;
    } catch { return false; }
}

// ============================================================
// ✅ تحقق من Discord token وإرجاع بيانات المستخدم
// ============================================================
async function fetchDiscordUser(token) {
    const res = await fetch('https://discord.com/api/users/@me', {
        headers: { Authorization: `Bearer ${token}` }
    });
    if (!res.ok) throw new Error(`Discord API error: ${res.status}`);
    const user = await res.json();

    // ✅ تحقق من صحة البيانات القادمة من Discord
    if (!DISCORD_ID_REGEX.test(user.id))          throw new Error('Invalid Discord ID');
    if (typeof user.username !== 'string')         throw new Error('Invalid username');
    if (user.username.length > 32)                 throw new Error('Username too long');
    if (user.avatar && !AVATAR_REGEX.test(user.avatar)) throw new Error('Invalid avatar hash');

    return user;
}

// ============================================================
// أحداث القائمة
// ============================================================
document.getElementById('menu-btn').onclick  = () => document.getElementById('sidebar').style.right = '0';
document.getElementById('close-btn').onclick = () => document.getElementById('sidebar').style.right = '-320px';

// إغلاق القائمة بالضغط على Escape
document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
        document.getElementById('sidebar').style.right = '-320px';
        closeAppModal();
    }
});

function startLogin() {
    if (!RateLimiter.check('login', 5, 60000)) {
        showToast('حاول مجدداً بعد دقيقة');
        return;
    }
    window.location.href = `https://discord.com/api/oauth2/authorize?client_id=${CLIENT_ID}&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&response_type=token&scope=identify`;
}

// ============================================================
// ✅ تحميل الصفحة — منطق التوثيق الآمن
// ============================================================
window.onload = async () => {
    const fragment = new URLSearchParams(window.location.hash.slice(1));
    let token = fragment.get('access_token');

    if (token) {
        TokenStore.save(token);
        // ✅ إزالة التوكن من الـ URL فوراً (لا يظهر في history)
        window.history.replaceState({}, document.title, window.location.pathname);
    } else {
        token = TokenStore.get();
    }

    if (!token) return;

    try {
        const user = await fetchDiscordUser(token);
        currentUser = user;

        // ✅ التحقق من الـ blacklist
        const { data: ban } = await _supabase
            .from('blacklist')
            .select('reason')
            .eq('user_id', user.id)
            .maybeSingle();

        if (ban) {
            const screen = document.getElementById('blacklist-screen');
            screen.classList.remove('hidden');
            // ✅ textContent آمن تماماً
            document.getElementById('ban-reason').textContent = `بسبب: ${sanitizeText(ban.reason, 200)}`;
            TokenStore.clear();
            return;
        }

        // ✅ تحديث الواجهة بشكل آمن
        document.getElementById('login-block').classList.add('hidden');
        document.getElementById('welcome-block').classList.remove('hidden');
        document.getElementById('u-name').textContent = sanitizeText(user.username, 50);

        // ✅ بناء URL الصورة بعد التحقق من القيم
        const avatarEl = document.getElementById('u-img');
        if (user.avatar) {
            avatarEl.src = `https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.png`;
        } else {
            // Fallback للـ default Discord avatar
            const defaultIdx = parseInt(user.discriminator || '0') % 5;
            avatarEl.src = `https://cdn.discordapp.com/embed/avatars/${defaultIdx}.png`;
        }
        avatarEl.alt = sanitizeText(user.username, 50);
        // ✅ منع تحميل صور خاطئة
        avatarEl.onerror = () => { avatarEl.src = ''; avatarEl.alt = '?'; };

        // ✅ التحقق من الأدمن من قاعدة البيانات
        const isAdmin = await checkIsAdmin(user.id);
        if (isAdmin) {
            document.getElementById('admin-btn').classList.remove('hidden');
        }

    } catch (e) {
        console.warn('Auth error:', e.message);
        TokenStore.clear(); // ✅ مسح توكن فاسد
    }
};

// ============================================================
// ✅ showSection — whitelist فقط
// ============================================================
function showSection(id) {
    if (!ALLOWED_SECTIONS.has(id)) return; // رفض أي قيمة غير مسموح بها

    document.querySelectorAll('main > section').forEach(s => s.classList.add('hidden'));
    const target = document.getElementById(`sec-${id}`);
    if (!target) return;
    target.classList.remove('hidden');
    document.getElementById('sidebar').style.right = '-320px';

    if (id === 'news')  loadNews();
    if (id === 'rules') loadRules();
    if (id === 'apps')  loadApps();
}

// ============================================================
// ✅ تحميل البيانات — بدون innerHTML من بيانات قاعدة البيانات
// ============================================================
async function loadRules() {
    const container = document.getElementById('rules-container');
    container.textContent = ''; // أسرع وأأمن من innerHTML = ''

    const { data, error } = await _supabase
        .from('rules')
        .select('id, title, content') // ✅ نجلب فقط الحقول المطلوبة
        .order('order', { ascending: true });

    if (error || !data?.length) {
        const msg = document.createElement('p');
        msg.className   = 'text-zinc-600 text-center py-10';
        msg.textContent = 'لا توجد قوانين حالياً.';
        container.appendChild(msg);
        return;
    }

    const frag = document.createDocumentFragment(); // ✅ أداء أفضل
    data.forEach(r => frag.appendChild(createRuleCard(r)));
    container.appendChild(frag);
}

// ============================================================
// ✅ فتح نموذج التقديم — مع تحقق كامل
// ============================================================
async function openForm(id) {
    if (!currentUser) { showToast('سجل دخولك أولاً!'); return; }

    // ✅ تحقق من صيغة الـ ID (UUID أو رقم)
    if (!id || typeof id !== 'string') return;
    const isValidId = UUID_REGEX.test(id) || /^\d+$/.test(id);
    if (!isValidId || id.length > 50) return;

    // ✅ Rate limiting للفتح
    if (!RateLimiter.check('openForm', 10, 60000)) {
        showToast('تباطأ قليلاً!');
        return;
    }

    const { data: app, error } = await _supabase
        .from('forms')
        .select('id, title, is_open, questions') // ✅ لا webhook هنا
        .eq('id', id)
        .single();

    if (error || !app)          { showToast('حدث خطأ في تحميل النموذج'); return; }
    if (!app.is_open)           { showToast('التوظيف مغلق حالياً');       return; }
    if (!Array.isArray(app.questions)) { showToast('بيانات النموذج غير صالحة'); return; }

    // ✅ التحقق من أن المستخدم لم يقدّم طلباً مسبقاً لهذا النموذج
    const { data: existing } = await _supabase
        .from('applications')
        .select('id')
        .eq('form_id', app.id)
        .eq('user_id', currentUser.id)
        .maybeSingle();

    if (existing) { showToast('لقد قدّمت طلباً لهذا المنصب مسبقاً'); return; }

    currentAppData = app;
    document.getElementById('modal-title').textContent = sanitizeText(app.title, 100);

    const container = document.getElementById('modal-questions');
    container.textContent = '';

    const ALLOWED_Q_TYPES = new Set(['text', 'select']); // whitelist أنواع الأسئلة

    const frag = document.createDocumentFragment();
    app.questions.slice(0, 20).forEach((q, i) => { // ✅ حد أقصى 20 سؤال
        if (!q || typeof q.text !== 'string') return;

        const wrapper = document.createElement('div');
        wrapper.className = 'space-y-3';

        const label = document.createElement('label');
        label.className   = 'text-sm font-bold text-zinc-400 block';
        label.textContent = sanitizeText(q.text, 200);
        label.htmlFor     = `q-${i}`;

        const qType = ALLOWED_Q_TYPES.has(q.type) ? q.type : 'text'; // whitelist النوع

        let input;
        if (qType === 'select') {
            input = document.createElement('select');
            ['نعم', 'لا'].forEach(opt => { // ✅ الخيارات ثابتة وآمنة
                const o = document.createElement('option');
                o.textContent = opt;
                o.value       = opt;
                input.appendChild(o);
            });
        } else {
            input = document.createElement('input');
            input.type      = 'text';
            input.maxLength = 500; // ✅ تحديد الطول الأقصى
            input.autocomplete = 'off';
        }

        input.id        = `q-${i}`;
        input.className = 'q-in w-full bg-zinc-900/50 border border-white/5 p-4 rounded-xl focus:border-red-600 outline-none transition';
        input.dataset.idx = String(i);

        wrapper.appendChild(label);
        wrapper.appendChild(input);
        frag.appendChild(wrapper);
    });

    container.appendChild(frag);
    document.getElementById('modal-app').classList.remove('hidden');
    document.getElementById('modal-app').focus();
}

// ============================================================
// ✅ إرسال النموذج — عبر Supabase (الـ webhook يُرسل من السيرفر)
// ============================================================
async function submitForm() {
    if (!currentUser || !currentAppData) { showToast('حدث خطأ، حاول مجدداً'); return; }

    // ✅ Rate limiting صارم للإرسال
    if (!RateLimiter.check('submitForm', 2, 120000)) {
        showToast('انتظر دقيقتين قبل إرسال طلب آخر');
        return;
    }

    const btn = document.getElementById('submit-btn');
    btn.disabled    = true;
    btn.textContent = 'جاري الإرسال...';

    // ✅ جمع الإجابات مع تنظيفها
    const answers = Array.from(document.querySelectorAll('.q-in')).map(el => {
        const idx = parseInt(el.dataset.idx, 10);
        if (isNaN(idx) || idx < 0 || idx >= currentAppData.questions.length) return null;
        return {
            question: sanitizeText(currentAppData.questions[idx]?.text || '', 200),
            answer:   sanitizeText(el.value || 'بدون إجابة', 500)
        };
    }).filter(Boolean);

    try {
        // ✅ الإرسال لـ Supabase فقط
        // Supabase Database Webhook أو Edge Function ترسل الـ Discord webhook من السيرفر
        const { error } = await _supabase
            .from('applications')
            .insert({
                form_id:    currentAppData.id,
                user_id:    currentUser.id,
                username:   sanitizeText(currentUser.username, 50),
                avatar:     currentUser.avatar || null,
                answers:    answers,
                created_at: new Date().toISOString()
            });

        if (error) throw error;

        showToast('✅ تم إرسال طلبك بنجاح!');
        closeAppModal();
    } catch (e) {
        console.error('Submit error:', e.message);
        showToast('❌ فشل الإرسال، حاول مجدداً');
    } finally {
        btn.disabled    = false;
        btn.textContent = 'إرسال الطلب الآن';
    }
}

function closeAppModal() {
    document.getElementById('modal-app').classList.add('hidden');
    currentAppData = null;
}

function logout() {
    TokenStore.clear();
    currentUser = null;
    sessionStorage.clear();
    location.reload();
}
