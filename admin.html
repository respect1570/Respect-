<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RESPECT | Final Master Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Almarai:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --main-red: #ff0000; --dark-bg: #050505; }
        body { font-family: 'Almarai', sans-serif; background: var(--dark-bg); color: white; margin: 0; overflow-x: hidden; }
        .glass { background: rgba(10, 10, 10, 0.98); backdrop-filter: blur(20px); border-left: 1px solid rgba(255,0,0,0.1); }
        .sidebar { width: 280px; height: 100vh; position: fixed; right: 0; top: 0; z-index: 1000; }
        .main-content { margin-right: 280px; padding: 40px; }
        input, textarea, select { background: #0a0a0a !important; border: 1px solid #1a1a1a !important; color: white !important; padding: 14px; border-radius: 12px; width: 100%; outline: none; }
        .btn-red { background: var(--main-red); font-weight: 800; border-radius: 12px; transition: 0.3s; cursor: pointer; border: none; color: white; display: inline-flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-red:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(255,0,0,0.4); }
        .card { background: #080808; border: 1px solid #111; border-radius: 20px; padding: 25px; margin-bottom: 20px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="loading-overlay" class="fixed inset-0 bg-black z-[9999] flex flex-col items-center justify-center">
        <div class="animate-spin rounded-full h-16 w-16 border-t-4 border-red-600 mb-4"></div>
        <p class="text-red-600 font-bold">جاري تشغيل نظام التحكم...</p>
    </div>

    <aside class="sidebar glass p-6">
        <div class="mb-10 text-center">
            <div class="w-20 h-20 bg-red-600 rounded-3xl mx-auto mb-4 flex items-center justify-center shadow-red-600/30 shadow-2xl">
                <i class="fas fa-crown text-3xl"></i>
            </div>
            <h1 class="text-2xl font-black italic">RESPECT <span class="text-red-600">CP</span></h1>
            <p id="role-display" class="text-[10px] text-zinc-500 mt-2 font-bold tracking-widest uppercase"></p>
        </div>
        <nav class="flex flex-col gap-2">
            <button onclick="nav('news')" class="flex items-center gap-4 p-4 rounded-2xl hover:bg-white/5 transition text-right"><i class="fas fa-rss w-5 text-red-600"></i> الأخبار</button>
            <button onclick="nav('rules')" class="flex items-center gap-4 p-4 rounded-2xl hover:bg-white/5 transition text-right"><i class="fas fa-scroll w-5 text-red-600"></i> القوانين</button>
            <button onclick="nav('forms')" class="flex items-center gap-4 p-4 rounded-2xl hover:bg-white/5 transition text-right"><i class="fas fa-edit w-5 text-red-600"></i> التقديمات</button>
            <button onclick="nav('blacklist')" class="flex items-center gap-4 p-4 rounded-2xl hover:bg-white/5 transition text-right"><i class="fas fa-user-slash w-5 text-red-600"></i> البلاك ليست</button>
            <button onclick="nav('staff')" class="flex items-center gap-4 p-4 rounded-2xl hover:bg-white/5 transition text-right"><i class="fas fa-users-cog w-5 text-red-600"></i> الإدارة</button>
        </nav>
    </aside>

    <main class="main-content">
        <section id="sec-news">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-4xl font-black italic">الأخبار</h2>
                <button onclick="openNewsModal('news')" class="btn-red px-8 py-3 admin-btn hidden">+ إضافة خبر</button>
            </div>
            <div id="list-news"></div>
        </section>

        <section id="sec-rules" class="hidden">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-4xl font-black italic">القوانين</h2>
                <button onclick="openNewsModal('rules')" class="btn-red px-8 py-3 admin-btn hidden">+ إضافة قانون</button>
            </div>
            <div id="list-rules"></div>
        </section>

        <section id="sec-forms" class="hidden">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-4xl font-black italic">التقديمات</h2>
                <button onclick="openModal('app-modal')" class="btn-red px-8 py-3 admin-btn hidden">+ إنشاء قطاع</button>
            </div>
            <div id="list-forms" class="grid md:grid-cols-2 gap-6"></div>
        </section>

        <section id="sec-blacklist" class="hidden">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-4xl font-black italic text-red-600">BLACKLIST</h2>
                <button onclick="openModal('bl-modal')" class="btn-red px-8 py-3 admin-btn hidden">+ إضافة منع</button>
            </div>
            <div id="list-blacklist" class="grid gap-3"></div>
        </section>

        <section id="sec-staff" class="hidden">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-4xl font-black italic">طاقم الإدارة</h2>
                <button onclick="openModal('staff-modal')" class="btn-red px-8 py-3 admin-btn hidden">+ إضافة إداري</button>
            </div>
            <div id="list-staff" class="grid gap-3"></div>
        </section>
    </main>

    <div id="app-modal" class="fixed inset-0 hidden bg-black/95 z-[5000] flex items-center justify-center p-6">
        <div class="bg-[#0a0a0a] w-full max-w-2xl rounded-3xl p-8 border border-white/5 overflow-y-auto max-h-[90vh]">
            <h3 class="text-2xl font-bold mb-6 text-red-600">قطاع تقديم جديد</h3>
            <input id="app-title" placeholder="اسم القطاع" class="mb-4">
            <textarea id="app-desc" placeholder="الوصف" class="h-20 mb-4"></textarea>
            <input id="app-web" placeholder="Discord Webhook URL" class="mb-6">
            <div id="q-container" class="space-y-3 mb-6"></div>
            <button onclick="addQField()" class="w-full bg-white/5 py-3 rounded-xl mb-6 text-xs">+ إضافة سؤال</button>
            <div class="flex gap-2">
                <button onclick="saveForm()" class="flex-1 btn-red py-4">حفظ</button>
                <button onclick="closeModal('app-modal')" class="flex-1 bg-zinc-900 rounded-xl">إلغاء</button>
            </div>
        </div>
    </div>

    <div id="staff-modal" class="fixed inset-0 hidden bg-black/95 z-[5000] flex items-center justify-center p-6"><div class="bg-[#0a0a0a] w-full max-w-md rounded-3xl p-8 border border-white/5"><h3 class="text-2xl font-bold mb-6 text-red-600">تعيين إداري</h3><input id="st-uid" placeholder="Discord ID" class="mb-4"><select id="st-role" class="mb-6"><option value="2">Moderator</option><option value="3">Admin</option></select><button onclick="confirmStaff()" class="w-full btn-red py-4">تأكيد</button><button onclick="closeModal('staff-modal')" class="w-full text-zinc-600 mt-4 text-sm">إلغاء</button></div></div>
    <div id="bl-modal" class="fixed inset-0 hidden bg-black/95 z-[5000] flex items-center justify-center p-6"><div class="bg-[#0a0a0a] w-full max-w-md rounded-3xl p-8 border border-white/5"><h3 class="text-2xl font-bold mb-6">منع مستخدم</h3><input id="bl-uid" placeholder="User ID" class="mb-4"><textarea id="bl-msg" placeholder="السبب..." class="h-32 mb-6"></textarea><button onclick="confirmBlacklist()" class="w-full btn-red py-4">تأكيد</button><button onclick="closeModal('bl-modal')" class="w-full text-zinc-600 mt-4 text-sm">إلغاء</button></div></div>
    <div id="news-modal" class="fixed inset-0 hidden bg-black/95 z-[5000] flex items-center justify-center p-6"><div class="bg-[#0a0a0a] w-full max-w-md rounded-3xl p-8 border border-white/5"><h3 id="news-modal-title" class="text-2xl font-bold mb-6">إضافة محتوى</h3><input id="n-title" placeholder="العنوان" class="mb-4"><textarea id="n-txt" placeholder="التفاصيل..." class="h-40 mb-6"></textarea><button id="n-save-btn" class="w-full btn-red py-4">نشر</button><button onclick="closeModal('news-modal')" class="w-full text-zinc-600 mt-4 text-sm">إلغاء</button></div></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const _supabase = supabase.createClient('https://uvmsixbooxclnqduqivt.supabase.co', 'sb_publishable_c5KwR5PUs-dxGa57dLY5sw_c4TQ2Wo0');
        const MASTER_ID = "1413745713439047807";
        let user = null; let role = 1;

        async function init() {
            const token = localStorage.getItem('dc_token');
            if(!token) return window.location.href = 'index.html';
            
            const res = await fetch('https://discord.com/api/users/@me', { headers: { authorization: `Bearer ${token}` } });
            user = await res.json();
            
            const { data: staffData } = await _supabase.from('staff').select('role').eq('user_id', user.id).single();
            if(user.id === MASTER_ID) role = 4; else if(staffData) role = staffData.role;
            
            if(role < 2) return window.location.href = 'index.html';
            
            document.getElementById('role-display').innerText = {2:"MODERATOR", 3:"ADMIN", 4:"OWNER"}[role];
            if(role >= 3) document.querySelectorAll('.admin-btn').forEach(b => b.classList.remove('hidden'));
            document.getElementById('loading-overlay').classList.add('hidden');
            nav('news');
        }

        async function toggleForm(id, currentState, title) {
            const action = currentState ? "إغلاق" : "فتح";
            if(confirm(`هل أنت متأكد من ${action} تقديم: ${title}؟`)) {
                const { error } = await _supabase.from('forms').update({ is_open: !currentState }).eq('id', id);
                if(!error) loadData('forms'); else alert("فشل في تحديث الحالة");
            }
        }

        async function saveForm() {
            const qs = Array.from(document.querySelectorAll('.q-row')).map(r => ({
                text: r.querySelector('.q-val').value,
                type: r.querySelector('.q-ty').value
            }));
            const { error } = await _supabase.from('forms').insert([{
                title: document.getElementById('app-title').value,
                desc: document.getElementById('app-desc').value,
                webhook: document.getElementById('app-web').value,
                questions: qs,
                is_open: true
            }]);
            if(!error) location.reload(); else alert("خطأ: تأكد من مسميات الأعمدة");
        }

        async function confirmStaff() {
            const uid = document.getElementById('st-uid').value;
            const rl = document.getElementById('st-role').value;
            const { error } = await _supabase.from('staff').insert([{ user_id: uid, role: parseInt(rl) }]);
            if(!error) location.reload(); else alert("خطأ في التعيين");
        }

        async function confirmBlacklist() {
            const uid = document.getElementById('bl-uid').value;
            const res = document.getElementById('bl-msg').value;
            const { error } = await _supabase.from('blacklist').insert([{ user_id: uid, reason: res }]);
            if(!error) location.reload(); else alert("خطأ في المنع");
        }

        function openNewsModal(table) {
            document.getElementById('news-modal').classList.remove('hidden');
            document.getElementById('n-save-btn').onclick = async () => {
                await _supabase.from(table).insert([{ title: document.getElementById('n-title').value, content: document.getElementById('n-txt').value }]);
                location.reload();
            };
        }

        function addQField() {
            const div = document.createElement('div'); div.className = "flex gap-2 q-row";
            div.innerHTML = `<input class="q-val flex-[3]" placeholder="السؤال"><select class="q-ty flex-1"><option value="text">كتابة</option><option value="choice">اختياري</option></select>`;
            document.getElementById('q-container').appendChild(div);
        }

        function nav(sec) { document.querySelectorAll('section').forEach(s => s.classList.add('hidden')); document.getElementById(`sec-${sec}`).classList.remove('hidden'); loadData(sec); }
        
        async function loadData(t) { 
            const list = document.getElementById(`list-${t}`); list.innerHTML = '...';
            const { data, error } = await _supabase.from(t).select('*');
            if(error) return list.innerHTML = "خطأ في الجلب";
            
            list.innerHTML = data.map(i => {
                let actionBtn = '';
                if(t === 'forms' && role >= 3) {
                    actionBtn = `
                        <div class="flex gap-3 items-center">
                            <button onclick="toggleForm('${i.id}', ${i.is_open}, '${i.title}')" 
                                class="px-4 py-2 rounded-xl text-[11px] font-black transition ${i.is_open ? 'bg-green-600/10 text-green-500 border border-green-600/20' : 'bg-red-600/10 text-red-500 border border-red-600/20'}">
                                <i class="fas ${i.is_open ? 'fa-lock-open' : 'fa-lock'} ml-1"></i>
                                ${i.is_open ? 'مفتوح' : 'مغلق'}
                            </button>
                            <button onclick="del('${t}','${i.id}')" class="text-zinc-700 hover:text-red-600"><i class="fas fa-trash"></i></button>
                        </div>
                    `;
                } else if(role >= 3) {
                    actionBtn = `<button onclick="del('${t}','${i.id}')" class="text-zinc-700 hover:text-red-600"><i class="fas fa-trash"></i></button>`;
                }

                return `
                    <div class="card flex justify-between items-center border border-white/5 hover:border-red-600/20 transition">
                        <div>
                            <h4 class="text-white font-bold text-lg">${i.title || i.user_id}</h4>
                            <p class="text-xs text-zinc-500 mt-1">${i.content || i.desc || i.reason || 'رتبة إدارية'}</p>
                        </div>
                        ${actionBtn}
                    </div>`;
            }).join('');
        }

        async function del(t, id) { if(confirm("هل أنت متأكد من الحذف نهائياً؟")) { await _supabase.from(t).delete().eq('id', id); loadData(t); } }
        function openModal(id) { document.getElementById(id).classList.remove('hidden'); }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }
        init();
    </script>
</body>
</html>
